name: Metalyzer Continuous Integration Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Core Toolchain Verification (Ubuntu-Latest)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Install Systems Dependencies & Compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential g++

    - name: Configure CMake Build Target Matrix
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release -DUPDATE_SNAPSHOTS=OFF ..

    - name: Compile Primary Production Binaries
      run: |
        cd build
        make -j$(nproc) metalyzer_app

    - name: Execute Automated Snapshot Testing Pipeline
      run: |
        cd build
        ctest --output-on-failure
